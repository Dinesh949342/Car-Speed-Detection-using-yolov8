{% extends 'Users/UserBase.html' %}
{% block contents %}


    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
        }

        .video-processed-section {
            margin: 50px auto;
            max-width: 600px;
            background: #ffffff;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }

        .video-processed-section h1 {
            font-family: "Abril Fatface", serif;
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        .video-processed-section p {
            text-align: center;
            color: #555;
            margin-bottom: 20px;
        }

        .btn-download {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: #3498db;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            text-align: center;
            text-decoration: none;
            transition: background-color 0.3s;
        }

        .btn-download:hover {
            background-color: #2980b9;
        }
    </style>
    <div class="container">
        <div class="video-processed-section animate__animated animate__fadeIn">
            <h1>Video Processing Complete</h1>
            <p>Your video has been processed successfully. You can download the processed video below:</p>
            <a href="{{ video_url }}" download="processed_video.mp4" class="btn-download">Download Processed Video</a>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

{% endblock %}
