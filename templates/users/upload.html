{% extends 'Users/UserBase.html' %}
{% load static %}
{% block contents %}


    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
        }

        .video-upload-section {
            margin: 50px auto;
            max-width: 600px;
            background: #ffffff;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }

        .video-upload-section h1 {
            font-family: "Abril Fatface", serif;
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        .video-upload-section label {
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }

        .btn-upload {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: #1abc9c;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
            transition: background-color 0.3s;
        }

        .btn-upload:hover {
            background-color: #16a085;
        }
    </style>

    <div class="container">
        <div class="video-upload-section animate__animated animate__fadeIn">
            <h1>Upload Video</h1>
            <form action="{% url 'upload_video' %}" method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="video">Choose a video:</label>
                    <input type="file" name="video" id="video" class="form-control" accept="video/*" required>
                </div>
                <button type="submit" class="btn btn-upload">Upload and Process</button>
            </form>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>


{% endblock %}
